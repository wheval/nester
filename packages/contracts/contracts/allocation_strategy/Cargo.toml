[package]
name = "allocation-strategy-contract"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]
doctest = false

[dependencies]
soroban-sdk = { workspace = true }
nester-common = { path = "../../libs/common" }
nester-access-control = { path = "../access_control" }

[dev-dependencies]
soroban-sdk = { workspace = true, features = ["testutils"] }
yield-registry-contract = { path = "../yield_registry" }
